# MOTION CONTENT ENGINE — configuración central. Modificar = editar acá + commit.

strategy_pack: motor-de-tesis
serie_activa: "serie-1-diferencia"
mezcla_semanal: {problema: 1, metodo_o_resultados: 1, conexion: 1}
regla_70_30: true

# ── CANALES (account = ID de Blotato · platform = nombre Blotato) ──
canales:
  linkedin_paulo:  {account: 25264, platform: linkedin, emisor: paulo,  activo: true,  pieza: post,      hora: "09:00", dias: [mar, jue]}
  x_paulo:         {account: 20492, platform: twitter,  emisor: paulo,  activo: true,  pieza: hilo,      hora: "08:30", dias: [mar, vie]}
  linkedin_motion: {account: PENDIENTE, platform: linkedin, emisor: motion, activo: false, pieza: post,  hora: "11:00", dias: [mie]}
  instagram_motion:{account: PENDIENTE, platform: instagram, emisor: motion, activo: false, pieza: quote, hora: "12:00", dias: [vie]}

aprobacion:
  modo: programar_futuro     # las piezas quedan PROGRAMADAS y editables en el calendario de Blotato; nada sale sin tu OK final
  revision: blotato_calendar # https://my.blotato.com/queue/calendar

publicacion:
  proveedor: blotato
  timezone: America/Argentina/Buenos_Aires
  buffer_horas: 48           # programa con 48hs de anticipación para dar margen de revisión
