# MOTION CONTENT ENGINE — configuración central
# Modificar el sistema = editar este archivo + commit.

strategy_pack: motor-de-tesis        # switchable: motor-de-tesis | vender-sin-perseguir | waterfall
serie_activa: "serie-1-diferencia"   # ver strategy/tesis.md
mezcla_semanal: {problema: 1, metodo_o_resultados: 1, conexion: 1}
regla_70_30: true                    # 70% autoridad / 30% producto

canales:
  linkedin_paulo:   {emisor: paulo,  formato: post+newsletter+carrusel, dias: [mar, jue]}
  linkedin_motion:  {emisor: motion, formato: post+quote,               dias: [mie, vie]}
  showcase_talent:  {emisor: talent, formato: post,                     activo: false}  # activar en F3
  instagram_motion: {emisor: motion, formato: reel+quote,               dias: [vie, lun]}
  x_paulo:          {emisor: paulo,  formato: hilo,                     activo: false}  # activar tras retro mes 2

aprobacion:
  modo: humano_obligatorio           # NUNCA cambiar a auto
  carpeta_pendientes: queue/pending
  carpeta_aprobados: queue/approved
  notificacion: email                # TODO: configurar destinatario en secrets

publicacion:
  proveedor: blotato
  horarios: {mar: "09:00", mie: "11:00", jue: "10:00", vie: "12:00", lun: "09:00"}
  timezone: America/Argentina/Buenos_Aires
