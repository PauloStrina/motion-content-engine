name: 2-motor

# Renderiza y programa una semana aprobada o el ciclo completo.
# dry simula. live exige aprobación editorial y visual.
on:
  workflow_dispatch:
    inputs:
      mes:
        description: "Ciclo editorial (YYYY-MM)."
        required: true
      semana:
        description: "Semana a procesar. 'todas' procesa el ciclo completo."
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - todas
      modo:
        description: "dry = simular; live = programar en Blotato"
        required: true
        default: "dry"
        type: choice
        options:
          - dry
          - live

permissions:
  contents: write
  id-token: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    env:
      MOTION_TIMEZONE: America/Argentina/Buenos_Aires

    steps:
      - uses: actions/checkout@v4

      - name: Validar manifiesto y conceptos
        shell: bash
        run: |
          set -euo pipefail
          SEMANA_ARGS=()
          if [ "${{ inputs.semana }}" != "todas" ]; then
            SEMANA_ARGS=(--semana "${{ inputs.semana }}")
          fi
          APPROVAL_ARGS=()
          if [ "${{ inputs.modo }}" = "live" ]; then
            APPROVAL_ARGS=(--require-approved)
          fi
          python scripts/mes.py --mes "${{ inputs.mes }}" "${SEMANA_ARGS[@]}" "${APPROVAL_ARGS[@]}"
          python scripts/validar_conceptos_visuales.py --mes "${{ inputs.mes }}" "${SEMANA_ARGS[@]}" "${APPROVAL_ARGS[@]}"

      - name: Validar especificaciones visuales
        shell: bash
        run: |
          set -euo pipefail
          SEMANA_ARGS=()
          if [ "${{ inputs.semana }}" != "todas" ]; then
            SEMANA_ARGS=(--semana "${{ inputs.semana }}")
          fi
          APPROVAL_ARGS=()
          if [ "${{ inputs.modo }}" = "live" ]; then
            APPROVAL_ARGS=(--require-approved)
          fi
          python scripts/validar_assets_mes.py --mes "${{ inputs.mes }}" "${SEMANA_ARGS[@]}" "${APPROVAL_ARGS[@]}"

      - name: Instalar dependencias de render
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libpango-1.0-0 libpangoft2-1.0-0 poppler-utils
          pip install weasyprint --quiet

      - name: Renderizar carruseles
        shell: bash
        run: |
          set -euo pipefail
          RP=$(find . -name render.py -path "*design-system*" | head -1)
          RD=$(dirname "$RP")
          SEMANA_ARGS=()
          if [ "${{ inputs.semana }}" != "todas" ]; then
            SEMANA_ARGS=(--semana "${{ inputs.semana }}")
          fi
          python scripts/generar_carrusel_mes.py "${{ inputs.mes }}" media_out "$RP" "$RD/slides" "${SEMANA_ARGS[@]}"

      - name: Clonar motion-media y copiar medios
        env:
          TOKEN: ${{ secrets.MEDIA_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/ops-motionco/motion-media.git" media_repo
          mkdir -p media_repo/carruseles
          cp media_out/*.png media_repo/carruseles/ 2>/dev/null || true
          cd media_repo
          git config user.name "motion-engine"
          git config user.email "engine@motion.local"
          git add -A
          git commit -m "media ${{ inputs.mes }} semana ${{ inputs.semana }}" || echo "sin cambios"
          if [ "${{ inputs.modo }}" = "live" ]; then
            git push
          else
            echo "[DRY] no se pushea motion-media"
          fi

      - name: Esperar GitHub Pages
        if: ${{ inputs.modo == 'live' }}
        run: sleep 90

      - name: Programar alcance seleccionado
        env:
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
          REELS_DIR: media_repo/reels
        shell: bash
        run: |
          set -euo pipefail
          SEMANA_ARGS=()
          if [ "${{ inputs.semana }}" != "todas" ]; then
            SEMANA_ARGS=(--semana "${{ inputs.semana }}")
          fi
          MODE_ARGS=()
          if [ "${{ inputs.modo }}" = "dry" ]; then
            MODE_ARGS=(--dry)
          fi
          python scripts/publicador_mes.py --mes "${{ inputs.mes }}" "${SEMANA_ARGS[@]}" "${MODE_ARGS[@]}"
