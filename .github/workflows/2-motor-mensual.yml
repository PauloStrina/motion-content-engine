name: 2-motor-mensual

# Renderiza y programa el manifiesto mensual existente.
# dry simula. live exige aprobación y programa en Blotato.

on:
  workflow_dispatch:
    inputs:
      mes:
        description: "Mes a procesar (YYYY-MM)."
        required: true
      modo:
        description: "dry = simular; live = programar en Blotato"
        required: true
        default: "dry"

permissions:
  contents: write
  id-token: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    env:
      MOTION_TIMEZONE: America/Argentina/Buenos_Aires

    steps:
      - uses: actions/checkout@v4

      - name: Validar manifiesto
        run: |
          if [ "${{ github.event.inputs.modo }}" = "live" ]; then
            python scripts/mes.py --mes "${{ github.event.inputs.mes }}" --require-approved
          else
            python scripts/mes.py --mes "${{ github.event.inputs.mes }}"
          fi

      - name: Validar especificaciones visuales
        run: python scripts/validar_assets_mes.py --mes "${{ github.event.inputs.mes }}"

      - name: Instalar dependencias de render
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libpango-1.0-0 libpangoft2-1.0-0 poppler-utils
          pip install weasyprint --quiet

      - name: Renderizar carruseles
        run: |
          RP=$(find . -name render.py -path "*design-system*" | head -1)
          RD=$(dirname "$RP")
          python scripts/generar_carrusel_mes.py "${{ github.event.inputs.mes }}" media_out "$RP" "$RD/slides"

      - name: Clonar motion-media y copiar medios
        env:
          TOKEN: ${{ secrets.MEDIA_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/ops-motionco/motion-media.git" media_repo
          mkdir -p media_repo/carruseles
          cp media_out/*.png media_repo/carruseles/ 2>/dev/null || true
          cd media_repo
          git config user.name "motion-engine"
          git config user.email "engine@motion.local"
          git add -A
          git commit -m "media mes ${{ github.event.inputs.mes }}" || echo "sin cambios"
          if [ "${{ github.event.inputs.modo }}" = "live" ]; then
            git push
          else
            echo "[DRY] no se pushea motion-media"
          fi

      - name: Esperar GitHub Pages
        if: ${{ github.event.inputs.modo == 'live' }}
        run: sleep 90

      - name: Programar el mes
        env:
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
          REELS_DIR: media_repo/reels
        run: |
          FLAG=""
          if [ "${{ github.event.inputs.modo }}" = "dry" ]; then FLAG="--dry"; fi
          python scripts/publicador_mes.py --mes "${{ github.event.inputs.mes }}" $FLAG
