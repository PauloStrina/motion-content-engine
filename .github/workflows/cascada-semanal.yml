name: cascada-semanal
on:
  schedule: [{cron: "0 10 * * 1"}]   # lunes 07:00 ART (10:00 UTC)
  workflow_dispatch: {}
permissions:
  contents: write
  id-token: write
jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Estratega + Redactor (Claude Code headless)
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Read,Write,Edit,Glob,Grep,Bash"
          show_full_output: true
          prompt: |
            Tu tarea OBLIGATORIA es crear un archivo nuevo usando la herramienta Write.
            1. Leé: skills/00-contexto-comun.md, skills/01-estratega.md, skills/02-redactor.md,
               strategy/tesis.md, strategy/voz-motion.md, strategy/buyer-persona.md y el
               archivo que está dentro de queue/approved/ (último episodio producido).
            2. Determiná el PRÓXIMO episodio de la serie activa según strategy/tesis.md.
            3. Generá la cascada completa de ese episodio con el mismo formato del archivo
               de queue/approved/: post Paulo (2 variantes), post Motion, newsletter,
               guion de motion graphic, carrusel, quote card, plan de publicación, checklist.
            4. Usá la herramienta Write para guardar el resultado en la ruta:
               queue/pending/cascada_proximo_episodio.md
            El éxito de tu tarea se mide por UNA sola cosa: que ese archivo exista al final.
            No modifiques ningún otro archivo.
      - name: Commit de borradores
        run: |
          git config user.name "motion-engine"
          git config user.email "engine@motion.local"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add -A queue/
          git commit -m "cascada semanal (pendiente de aprobación)" || { echo "sin cambios para commitear"; exit 0; }
          git push origin HEAD:main
