name: render-visuales
on:
  workflow_dispatch: {}
permissions:
  contents: write
  id-token: write
jobs:
  disenar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependencias de render
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libpango-1.0-0 libpangoft2-1.0-0
          pip install weasyprint --quiet
      - name: Agente Diseñador (escribe el JSON de slides)
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Read,Write,Edit,Glob,Grep,Bash"
          show_full_output: true
          prompt: |
            Sos el Agente Diseñador de Motion. Tu tarea OBLIGATORIA:
            1. Leé design-system/README-kit.md y design-system/slides/ejemplo_ep1-1.json.
            2. Leé la cascada más reciente de queue/approved/ que NO tenga aún su JSON en design-system/slides/.
            3. Convertí la sección CARRUSEL de esa cascada en un JSON con EXACTAMENTE el mismo
               formato y kit del ejemplo (lam monocolor, eco, lyon, narrativa cromática por tipo).
            4. Guardalo con Write en design-system/slides/<nombre-del-episodio>.json
            El éxito se mide por una sola cosa: que ese archivo JSON exista al final.
      - name: Render de PDFs
        run: |
          cd design-system
          for j in slides/*.json; do
            n=$(basename "${j%.json}")
            python render.py "$j" "../queue/approved/${n}_carrusel.pdf"
          done
      - name: Commit
        run: |
          git config user.name "motion-engine"; git config user.email "engine@motion.local"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add -A queue/ design-system/slides/
          git commit -m "carrusel renderizado por el Agente Diseñador" || exit 0
          git push origin HEAD:main
