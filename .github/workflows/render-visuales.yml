name: render-visuales
on:
  workflow_dispatch: {}
permissions:
  contents: write
  id-token: write
jobs:
  disenar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependencias de render
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libpango-1.0-0 libpangoft2-1.0-0
          pip install weasyprint --quiet
      - name: Agente Diseñador (escribe los JSON de slides)
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Read,Write,Edit,Glob,Grep,Bash"
          show_full_output: true
          prompt: |
            Sos el Agente Diseñador de Motion. Localizá la carpeta del design system
            (donde están render.py, render_static.py y README-kit.md). Leé README-kit.md
            y los ejemplos: slides/ejemplo_ep1-1.json y slides/piezas_demo.json.
            Tomá la cascada más reciente de queue/approved/ que NO tenga aún sus JSON en slides/.
            Generá DOS archivos JSON en la carpeta slides/, respetando exactamente el kit
            (lam monocolor, eco, lyon, narrativa cromática por tipo de episodio):
            1. <episodio>_carrusel.json  → la sección CARRUSEL de la cascada (formato ejemplo_ep1-1).
            2. <episodio>_estaticas.json → la QUOTE CARD + cualquier número del Banco de Evidencias
               (pieza "data") + cualquier lista de pasos/principios (pieza "list"), formato piezas_demo.
            Usá Write para crear ambos archivos. El éxito se mide por que los dos JSON existan.
            No inventes números: si un dato no está en evidencias/banco.md, no crees pieza "data".
      - name: Render de PDFs (carruseles + estáticas)
        run: |
          RP=$(find . -name render.py -path "*design-system*" | head -1)
          RS=$(find . -name render_static.py -path "*design-system*" | head -1)
          RD=$(dirname "$RP")
          echo "Design system en: $RD"
          mkdir -p queue/approved
          for j in "$RD"/slides/*_carrusel.json; do
            [ -e "$j" ] || continue
            n=$(basename "${j%.json}")
            python "$RP" "$j" "queue/approved/${n}.pdf"
          done
          for j in "$RD"/slides/*_estaticas.json; do
            [ -e "$j" ] || continue
            n=$(basename "${j%.json}")
            python "$RS" "$j" "queue/approved/${n}.pdf"
          done
      - name: Commit
        run: |
          git config user.name "motion-engine"; git config user.email "engine@motion.local"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add -A queue/ design-system/
          git commit -m "visuales renderizados (carrusel + estáticas)" || exit 0
          git push origin HEAD:main
