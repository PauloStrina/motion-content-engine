name: 5-banco-reels
# Ingresa al BANCO los reels aprobados de una sesión ya renderizada (workflow 4-reels-render).
# Sube los MP4 a motion-media/reels/ (URL pública vía Pages, la lee Blotato) y registra la
# metadata en banco/reels/catalogo.json. La cascada mensual toma de ahí.
on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Slug de la sesión (ej: 2026-07-03-conceptos). Debe tener un render exitoso reciente."
        required: true
      reels:
        description: "Qué reels ingresar: 'todos' o números separados por coma (ej: 1,3,5). Los que NO apruebes, no entran."
        required: true
        default: "todos"
      run_id:
        description: "OPCIONAL: run id del 4-reels-render a usar. Vacío = el último exitoso."
        required: false
        default: ""
permissions:
  contents: write
  actions: read
jobs:
  ingresar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependencias
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - name: Bajar el artifact del render
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.inputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            # último artifact NO expirado con el nombre exacto de la sesión
            RUN_ID=$(gh api "/repos/${{ github.repository }}/actions/artifacts?name=reels-${{ github.event.inputs.slug }}&per_page=10" \
              --jq '[.artifacts[] | select(.expired==false)][0].workflow_run.id')
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: no hay artifact reels-${{ github.event.inputs.slug }} vigente. Corré 4-reels-render primero."; exit 1
          fi
          echo "Usando run $RUN_ID"
          gh run download "$RUN_ID" --repo ${{ github.repository }} \
            -n "reels-${{ github.event.inputs.slug }}" -D media_out
          ls media_out
      - name: Clonar motion-media
        env:
          TOKEN: ${{ secrets.MEDIA_REPO_TOKEN }}
        run: git clone "https://x-access-token:${TOKEN}@github.com/ops-motionco/motion-media.git" media_repo
      - name: Ingresar al banco
        run: python scripts/banco_reels.py "${{ github.event.inputs.slug }}" media_out media_repo --reels "${{ github.event.inputs.reels }}"
      - name: Push MP4s a motion-media
        run: |
          cd media_repo
          git config user.name "motion-engine"; git config user.email "engine@motion.local"
          git add -A; git commit -m "banco: reels de ${{ github.event.inputs.slug }}" || echo "sin cambios"
          git push
      - name: Commit catálogo
        run: |
          git config user.name "motion-engine"; git config user.email "engine@motion.local"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add banco/
          git commit -m "banco: catalogo actualizado (${{ github.event.inputs.slug }})" || echo "sin cambios"
          git push origin HEAD:main
