name: publicar-blotato
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Programar piezas aprobadas en Blotato (modo revisión)
        env:
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
        run: |
          # Por seguridad arranca en DRY-RUN: muestra qué haría sin publicar.
          # Cuando confirmes que el mapeo es correcto, quitá "--dry" para programar de verdad.
          python scripts/publish_blotato.py --dry
