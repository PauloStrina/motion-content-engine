name: materialize-approved-assets

on:
  push:
    branches:
      - content/2026-07-semana-3
    paths:
      - "asset-payload/2026-07-semana-3/READY"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: content/2026-07-semana-3
          fetch-depth: 0

      - name: Reconstruir paquete aprobado
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD="asset-payload/2026-07-semana-3"
          TARGET="assets/approved/2026-07-semana-3"
          rm -rf "$TARGET"
          mkdir -p "$TARGET" /tmp/motion-assets-parts

          for source in "$PAYLOAD"/assets.zip.part*.b64; do
            name="$(basename "$source" .b64)"
            base64 --decode "$source" > "/tmp/motion-assets-parts/$name"
          done

          cat /tmp/motion-assets-parts/assets.zip.part* > /tmp/motion-assets.zip
          unzip -q /tmp/motion-assets.zip -d "$TARGET"

          test -f "$TARGET/01_lunes_linkedin.png"
          test "$(find "$TARGET/lunes_instagram" -name '*.png' | wc -l)" -eq 10
          test "$(find "$TARGET/miercoles_comunidad" -name '*.png' | wc -l)" -eq 10
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path('assets/approved/2026-07-semana-3')
          manifest = json.loads((root / 'manifest.json').read_text(encoding='utf-8'))
          expected = {item['file']: item['sha256'] for item in manifest['assets']}
          for rel, digest in expected.items():
              path = root / rel
              actual = hashlib.sha256(path.read_bytes()).hexdigest()
              if actual != digest:
                  raise SystemExit(f'hash inválido: {rel}')
          print(f'✓ {len(expected)} masters aprobados verificados por hash')
          PY

      - name: Guardar masters inmutables
        run: |
          rm -rf asset-payload/2026-07-semana-3
          git config user.name "motion-engine"
          git config user.email "engine@motion.local"
          git add assets/approved/2026-07-semana-3 asset-payload/2026-07-semana-3
          git commit -m "assets: materializar masters aprobados de la semana 3"
          git push origin HEAD:content/2026-07-semana-3
