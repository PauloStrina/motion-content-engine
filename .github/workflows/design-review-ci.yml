name: design-review-ci

on:
  pull_request:
    paths:
      - "design-system/reviews/**"
      - "design-system/render.py"
      - "scripts/validar_revision_diseno.py"
      - ".github/workflows/design-review-ci.yml"

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar render y composición de previews
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libpango-1.0-0 libpangoft2-1.0-0 poppler-utils
          pip install --quiet weasyprint pillow

      - name: Validar paquetes de revisión
        run: |
          set -euo pipefail
          mapfile -t REVIEWS < <(find design-system/reviews -name review.json -type f | sort)
          test "${#REVIEWS[@]}" -gt 0
          for review in "${REVIEWS[@]}"; do
            python scripts/validar_revision_diseno.py "$review"
          done

      - name: Renderizar todas las versiones
        run: |
          set -euo pipefail
          mkdir -p /tmp/design-review
          mapfile -t SPECS < <(find design-system/reviews -path '*/specs/*.json' -type f | sort)
          test "${#SPECS[@]}" -gt 0
          for spec in "${SPECS[@]}"; do
            name="$(basename "$spec" .json)"
            out="/tmp/design-review/$name"
            mkdir -p "$out"
            python design-system/render.py "$spec" "$out/$name.pdf"
            pdftoppm -png -r 84 "$out/$name.pdf" "$out/$name"
          done

      - name: Crear contact sheets
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw

          root = Path('/tmp/design-review')
          for folder in sorted(p for p in root.iterdir() if p.is_dir()):
              images = [Image.open(path).convert('RGB') for path in sorted(folder.glob('*.png'))]
              if not images:
                  continue
              thumb_w = 360
              thumbs = []
              for image in images:
                  ratio = thumb_w / image.width
                  thumb = image.resize((thumb_w, int(image.height * ratio)))
                  thumbs.append(thumb)
              gap = 18
              title_h = 54
              width = len(thumbs) * thumb_w + (len(thumbs) + 1) * gap
              height = max(t.height for t in thumbs) + title_h + 2 * gap
              sheet = Image.new('RGB', (width, height), 'white')
              draw = ImageDraw.Draw(sheet)
              draw.text((gap, 14), folder.name, fill='black')
              x = gap
              for thumb in thumbs:
                  sheet.paste(thumb, (x, title_h + gap))
                  x += thumb_w + gap
              sheet.save(folder / f'{folder.name}-contact-sheet.png')
          PY

      - name: Publicar previews como artifact
        uses: actions/upload-artifact@v4
        with:
          name: design-review-previews
          path: /tmp/design-review
          retention-days: 14
