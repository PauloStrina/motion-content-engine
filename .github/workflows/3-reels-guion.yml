name: 3-reels-guion
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Link de Google Drive del video largo (archivo o carpeta compartida con 'cualquiera con el enlace')."
        required: true
      slug:
        description: "Nombre de la sesión (ej: 2026-07-03-conceptos). Nombra la carpeta en pipelines/video/reels/."
        required: true
      con_pantalla:
        description: "¿La sesión es una capacitación con grabación de pantalla? (los reels salen en modo split: pantalla arriba, cámara abajo)"
        required: false
        default: "no"
      brief_adicional:
        description: "OPCIONAL: foco/criterio específico para ESTA sesión (qué buscar, qué evitar). Se suma a las reglas de PROMPT_editor_video.md, no las reemplaza."
        required: false
        default: ""
permissions:
  contents: write
  id-token: write
jobs:
  guion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependencias
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install --quiet faster-whisper
          pip install --quiet --force-reinstall "gdown==5.2.0"
      - name: Descargar video de Drive
        run: python3 pipelines/video/descargar.py "${{ github.event.inputs.video_url }}" _video
      - name: Transcribir (whisper, timestamps por palabra)
        run: python pipelines/video/transcribir.py _video/input.mp4 "pipelines/video/reels/${{ github.event.inputs.slug }}"
      - name: Editor de Video (Claude elige los reels)
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-opus-4-8 --allowedTools Read,Write,Glob,Grep"
          show_full_output: true
          prompt: |
            Sos el Editor de Video de Motion. Tu trabajo es de CRITERIO editorial, no mecánico.
            SESIÓN: pipelines/video/reels/${{ github.event.inputs.slug }}/ (ya tiene transcript.md y transcript.json).
            Leé pipelines/video/PROMPT_editor_video.md y seguilo AL PIE DE LA LETRA, incluido el PASO 0
            (leer la estrategia completa antes de elegir nada).
            Escribí pipelines/video/reels/${{ github.event.inputs.slug }}/manifiesto_reels.json con la
            estructura EXACTA del prompt.
            SESIÓN CON PANTALLA: "${{ github.event.inputs.con_pantalla }}" — si es "si"/"sí", es una
            capacitación con grabación de pantalla: usá "modo":"split" en TODOS los reels.
            BRIEF ADICIONAL para ESTA sesión (además de PROMPT_editor_video.md, nunca en su lugar):
            "${{ github.event.inputs.brief_adicional }}"
            Éxito = existe el manifiesto, cada reel dura 20-62s según los timestamps, ningún segmento
            incluye retomas descartadas, y los captions pasan la auto-crítica de voz.
      - name: Commit (transcript + manifiesto de reels)
        run: |
          git config user.name "motion-engine"; git config user.email "engine@motion.local"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add pipelines/video/reels/
          git commit -m "reels: guion de la sesión ${{ github.event.inputs.slug }}" || echo "sin cambios"
          git push origin HEAD:main
