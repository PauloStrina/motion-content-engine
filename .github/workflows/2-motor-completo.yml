name: 2-motor-completo
on:
  workflow_dispatch:
    inputs:
      fecha:
        description: "Fecha del LUNES de la semana a publicar (YYYY-MM-DD). Debe coincidir con el manifiesto generado."
        required: true
      modo:
        description: "dry = simular (no toca Blotato) · live = programar de verdad"
        required: true
        default: "dry"
permissions:
  contents: write
  id-token: write
jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependencias
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libpango-1.0-0 libpangoft2-1.0-0 poppler-utils
          pip install weasyprint --quiet
      - name: Render de los carruseles (HEM + newsletter) de la semana
        run: |
          RP=$(find . -name render.py -path "*design-system*" | head -1)
          RD=$(dirname "$RP")
          python scripts/generar_carrusel.py "${{ github.event.inputs.fecha }}" media_out "$RP" "$RD/slides"
      - name: Empujar media a motion-media
        env:
          TOKEN: ${{ secrets.MEDIA_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/ops-motionco/motion-media.git" media_repo
          mkdir -p media_repo/carruseles
          cp media_out/*.png media_repo/carruseles/ 2>/dev/null || true
          cp media_out/*.pdf media_repo/carruseles/ 2>/dev/null || true
          cd media_repo
          git config user.name "motion-engine"; git config user.email "engine@motion.local"
          git add -A; git commit -m "media semana ${{ github.event.inputs.fecha }}" || echo "sin cambios"
          git push
      - name: Esperar publicación de Pages
        run: sleep 90
      - name: Programar la semana en Blotato (cada canal su día)
        env:
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
          MEDIA_OUT_DIR: media_out
        run: |
          FLAG=""
          if [ "${{ github.event.inputs.modo }}" = "dry" ]; then FLAG="--dry"; fi
          python scripts/publicador.py $FLAG --fecha "${{ github.event.inputs.fecha }}"
