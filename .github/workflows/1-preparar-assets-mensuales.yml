name: 1-preparar-assets-mensuales

# Recibe un manifiesto mensual ya escrito y aprobado.
# Solo genera especificaciones visuales; no redacta ni modifica el contenido.

on:
  workflow_dispatch:
    inputs:
      mes:
        description: "Mes a preparar (YYYY-MM). Debe existir manifiestos/mes_<YYYY-MM>.json aprobado."
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  preparar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar manifiesto aprobado
        run: python scripts/mes.py --mes "${{ github.event.inputs.mes }}" --require-approved

      - name: Diseñar carruseles sin alterar copy
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-opus-4-8 --allowedTools Read,Write,Edit,Glob,Grep,Bash"
          show_full_output: true
          prompt: |
            MES: "${{ github.event.inputs.mes }}"
            Leé scripts/PROMPT_preparar_assets_mes.md y ejecutalo exactamente.
            El manifiesto ya está aprobado: no cambies una sola palabra ni ningún campo.
            No leas archive/** y no modifiques ningún archivo relacionado con creación o edición de video.
            Éxito = todos los JSON visuales existen y `python scripts/validar_assets_mes.py --mes "${{ github.event.inputs.mes }}"` finaliza sin errores.

      - name: Validar assets
        run: python scripts/validar_assets_mes.py --mes "${{ github.event.inputs.mes }}"

      - name: Commit de especificaciones visuales
        run: |
          git config user.name "motion-engine"
          git config user.email "engine@motion.local"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add design-system/slides/
          git commit -m "assets: preparar mes ${{ github.event.inputs.mes }}" || echo "sin cambios"
          git push origin HEAD:main
