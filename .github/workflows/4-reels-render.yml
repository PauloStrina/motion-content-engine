name: 4-reels-render
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "El mismo video largo usado en el guion."
        required: true
      slug:
        description: "Slug de la sesión con transcript y manifiesto válidos."
        required: true
      layout_mode:
        description: "El motor resuelve el layout por reel; keep_manifest conserva coordenadas manuales existentes."
        required: true
        default: "auto_per_reel"
        type: choice
        options:
          - auto_per_reel
          - zones_single_file
          - camera_only
          - split_two_files
          - keep_manifest
      poster_asset:
        description: "Imagen superior cuando no hay contenido proyectado. Ruta dentro del repo."
        required: true
        default: "design-system/assets/innpulso-fondo.png"
      video_pantalla_url:
        description: "Solo para split_two_files: grabación de pantalla sincronizada."
        required: false
        default: ""
permissions:
  contents: read
jobs:
  cortar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      reels: ${{ steps.lista.outputs.reels }}
    env:
      VIDEO_URL: ${{ inputs.video_url }}
      SLUG: ${{ inputs.slug }}
      LAYOUT_MODE: ${{ inputs.layout_mode }}
      POSTER_ASSET: ${{ inputs.poster_asset }}
      VIDEO_PANTALLA_URL: ${{ inputs.video_pantalla_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Dependencias
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg fontconfig
          pip install --quiet --force-reinstall "gdown==5.2.0"
          pip install --quiet opencv-python-headless
      - name: Validar inputs de layout
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$SLUG" || "$SLUG" == *"/"* || "$SLUG" == *".."* ]]; then
            echo "ERROR: slug inválido" >&2
            exit 1
          fi
          if [[ "$POSTER_ASSET" != design-system/assets/* || "$POSTER_ASSET" == *".."* ]]; then
            echo "ERROR: poster_asset debe estar dentro de design-system/assets/" >&2
            exit 1
          fi
          if [ "$LAYOUT_MODE" = "split_two_files" ] && [ -z "$VIDEO_PANTALLA_URL" ]; then
            echo "ERROR: split_two_files requiere video_pantalla_url" >&2
            exit 1
          fi
          if [ ! -f "$POSTER_ASSET" ]; then
            echo "ERROR: no existe poster_asset=$POSTER_ASSET" >&2
            exit 1
          fi
      - name: Descargar video de Drive
        run: python3 pipelines/video/descargar.py "$VIDEO_URL" _video
      - name: Descargar video de pantalla (si hay)
        if: ${{ inputs.video_pantalla_url != '' }}
        run: |
          python3 pipelines/video/descargar.py "$VIDEO_PANTALLA_URL" _pantalla
          mv _pantalla/input.mp4 _video/pantalla.mp4
      - name: Resolver layout por reel
        run: |
          python pipelines/video/resolver_layout.py \
            _video/input.mp4 \
            "pipelines/video/reels/$SLUG" \
            --mode "$LAYOUT_MODE" \
            --poster "$POSTER_ASSET" \
            --preview-dir layout_preview \
            --output _layout/manifiesto_resuelto.json
      - name: Validar manifiesto para render
        run: |
          python pipelines/video/validar_manifiesto.py \
            "pipelines/video/reels/$SLUG" --stage render \
            --manifest _layout/manifiesto_resuelto.json
      - name: Subir diagnóstico de layout
        uses: actions/upload-artifact@v4
        with:
          name: layout-preview-${{ inputs.slug }}
          path: layout_preview/
          retention-days: 14
      - name: Preparar sesión efímera de render
        run: |
          mkdir -p _runtime/session
          cp "pipelines/video/reels/$SLUG/transcript.json" _runtime/session/transcript.json
          cp _layout/manifiesto_resuelto.json _runtime/session/manifiesto_reels.json
      - name: Cortar reels (video limpio + timestamps para Remotion)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f _video/pantalla.mp4 ]; then
            python pipelines/video/cortar.py _video/input.mp4 _runtime/session media_clean \
              --poster "$POSTER_ASSET" --pantalla _video/pantalla.mp4 --remotion
          else
            python pipelines/video/cortar.py _video/input.mp4 _runtime/session media_clean \
              --poster "$POSTER_ASSET" --remotion
          fi
      - name: Listar reels para la matriz de render
        id: lista
        run: echo "reels=$(ls media_clean/*.props.json | xargs -n1 basename | sed 's/\.props\.json//' | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: media-clean-${{ inputs.slug }}
          path: media_clean/
          retention-days: 3
  render:
    needs: cortar
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        reel: ${{ fromJson(needs.cortar.outputs.reels) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: media-clean-${{ inputs.slug }}
          path: media_clean
      - name: Instalar fuentes Motion
        run: |
          sudo mkdir -p /usr/share/fonts/opentype/motion
          sudo cp design-system/fonts/*.otf /usr/share/fonts/opentype/motion/
          sudo fc-cache -f
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pipelines/video/remotion/package-lock.json
      - name: Branding con Remotion
        env:
          REEL_NAME: ${{ matrix.reel }}
        run: |
          cd pipelines/video/remotion
          npm ci --no-audit --no-fund
          mkdir -p public ../../../media_out
          cp ../../../design-system/assets/logo-blanco.png public/
          cp "../../../media_clean/$REEL_NAME.mp4" public/
          npx remotion render src/index.ts Reel "../../../media_out/$REEL_NAME.mp4" \
            --props="../../../media_clean/$REEL_NAME.props.json" \
            --chrome-mode=chrome-for-testing --timeout=60000
          npx remotion still src/index.ts Reel "../../../media_out/_control_$REEL_NAME.png" \
            --props="../../../media_clean/$REEL_NAME.props.json" \
            --frame=45 --chrome-mode=chrome-for-testing
      - uses: actions/upload-artifact@v4
        with:
          name: parcial-${{ inputs.slug }}-${{ matrix.reel }}
          path: media_out/*
          retention-days: 3
  empaquetar:
    needs: render
    runs-on: ubuntu-latest
    steps:
      - name: Unir los reels en un solo artifact
        uses: actions/upload-artifact/merge@v4
        with:
          name: reels-${{ inputs.slug }}
          pattern: parcial-${{ inputs.slug }}-*
          delete-merged: true
          retention-days: 14
