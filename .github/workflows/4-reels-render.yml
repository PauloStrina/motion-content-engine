name: 4-reels-render
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "El mismo video largo usado en el guion."
        required: true
      slug:
        description: "Slug de la sesión con transcript y manifiesto válidos."
        required: true
      layout_mode:
        description: "El motor resuelve el layout por reel; keep_manifest conserva coordenadas manuales existentes."
        required: true
        default: "auto_per_reel"
        type: choice
        options:
          - auto_per_reel
          - zones_single_file
          - camera_only
          - split_two_files
          - keep_manifest
      poster_asset:
        description: "Imagen superior cuando no hay contenido proyectado. Ruta dentro del repo."
        required: true
        default: "design-system/assets/innpulso-fondo.png"
      video_pantalla_url:
        description: "Solo para split_two_files: grabación de pantalla sincronizada."
        required: false
        default: ""
permissions:
  contents: read
jobs:
  cortar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      reels: ${{ steps.lista.outputs.reels }}
    steps:
      - uses: actions/checkout@v4
      - name: Dependencias
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg fontconfig
          pip install --quiet --force-reinstall "gdown==5.2.0"
          pip install --quiet opencv-python-headless
      - name: Validar inputs de layout
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.layout_mode }}" = "split_two_files" ] && [ -z "${{ github.event.inputs.video_pantalla_url }}" ]; then
            echo "ERROR: split_two_files requiere video_pantalla_url" >&2
            exit 1
          fi
          if [ ! -f "${{ github.event.inputs.poster_asset }}" ]; then
            echo "ERROR: no existe poster_asset=${{ github.event.inputs.poster_asset }}" >&2
            exit 1
          fi
      - name: Descargar video de Drive
        run: python3 pipelines/video/descargar.py "${{ github.event.inputs.video_url }}" _video
      - name: Descargar video de pantalla (si hay)
        if: ${{ github.event.inputs.video_pantalla_url != '' }}
        run: |
          python3 pipelines/video/descargar.py "${{ github.event.inputs.video_pantalla_url }}" _pantalla
          mv _pantalla/input.mp4 _video/pantalla.mp4
      - name: Resolver layout por reel
        run: |
          python pipelines/video/resolver_layout.py \
            _video/input.mp4 \
            "pipelines/video/reels/${{ github.event.inputs.slug }}" \
            --mode "${{ github.event.inputs.layout_mode }}" \
            --poster "${{ github.event.inputs.poster_asset }}" \
            --preview-dir layout_preview
      - name: Validar manifiesto para render
        run: |
          python pipelines/video/validar_manifiesto.py \
            "pipelines/video/reels/${{ github.event.inputs.slug }}" --stage render
      - name: Subir diagnóstico de layout
        uses: actions/upload-artifact@v4
        with:
          name: layout-preview-${{ github.event.inputs.slug }}
          path: layout_preview/
          retention-days: 14
      - name: Cortar reels (video limpio + timestamps para Remotion)
        shell: bash
        run: |
          set -euo pipefail
          EXTRA=(--poster "${{ github.event.inputs.poster_asset }}")
          if [ -f _video/pantalla.mp4 ]; then EXTRA+=(--pantalla _video/pantalla.mp4); fi
          python pipelines/video/cortar.py \
            _video/input.mp4 \
            "pipelines/video/reels/${{ github.event.inputs.slug }}" \
            media_clean \
            "${EXTRA[@]}" \
            --remotion
      - name: Listar reels para la matriz de render
        id: lista
        run: echo "reels=$(ls media_clean/*.props.json | xargs -n1 basename | sed 's/\.props\.json//' | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: media-clean-${{ github.event.inputs.slug }}
          path: media_clean/
          retention-days: 3
  render:
    needs: cortar
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        reel: ${{ fromJson(needs.cortar.outputs.reels) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: media-clean-${{ github.event.inputs.slug }}
          path: media_clean
      - name: Instalar fuentes Motion
        run: |
          sudo mkdir -p /usr/share/fonts/opentype/motion
          sudo cp design-system/fonts/*.otf /usr/share/fonts/opentype/motion/
          sudo fc-cache -f
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pipelines/video/remotion/package-lock.json
      - name: Branding con Remotion
        run: |
          cd pipelines/video/remotion
          npm ci --no-audit --no-fund
          mkdir -p public ../../../media_out
          cp ../../../design-system/assets/logo-blanco.png public/
          cp "../../../media_clean/${{ matrix.reel }}.mp4" public/
          npx remotion render src/index.ts Reel "../../../media_out/${{ matrix.reel }}.mp4" \
            --props="../../../media_clean/${{ matrix.reel }}.props.json" \
            --chrome-mode=chrome-for-testing --timeout=60000
          npx remotion still src/index.ts Reel "../../../media_out/_control_${{ matrix.reel }}.png" \
            --props="../../../media_clean/${{ matrix.reel }}.props.json" \
            --frame=45 --chrome-mode=chrome-for-testing
      - uses: actions/upload-artifact@v4
        with:
          name: parcial-${{ github.event.inputs.slug }}-${{ matrix.reel }}
          path: media_out/*
          retention-days: 3
  empaquetar:
    needs: render
    runs-on: ubuntu-latest
    steps:
      - name: Unir los reels en un solo artifact
        uses: actions/upload-artifact/merge@v4
        with:
          name: reels-${{ github.event.inputs.slug }}
          pattern: parcial-${{ github.event.inputs.slug }}-*
          delete-merged: true
          retention-days: 14
