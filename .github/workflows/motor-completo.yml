name: motor-completo
on:
  workflow_dispatch: {}
permissions:
  contents: write
  id-token: write
jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependencias
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libpango-1.0-0 libpangoft2-1.0-0 poppler-utils
          pip install weasyprint --quiet

      - name: Renderizar carrusel del manifiesto (nombre dinámico)
        run: |
          RP=$(find . -name render.py -path "*design-system*" | head -1)
          RD=$(dirname "$RP")
          CARR=$(python3 -c "import json,glob,os; f=sorted(glob.glob('manifiestos/manifiesto_*.json'),key=os.path.getmtime)[-1]; m=json.load(open(f)); print(m['canales']['instagram']['carrusel'])")
          echo "Carrusel a renderizar: $CARR"
          mkdir -p media_out
          JSON="$RD/slides/${CARR}_carrusel.json"
          if [ ! -f "$JSON" ]; then
            JSON="$RD/slides/ejemplo_ep1-1.json"
            echo "Aviso: el Diseñador aún no generó ${CARR}_carrusel.json — uso spec de ejemplo"
          fi
          echo "Spec usada: $JSON"
          python "$RP" "$JSON" "media_out" --png
          BASE=$(basename "${JSON%.json}")
          i=1
          for f in $(ls media_out/${BASE}-*.png 2>/dev/null | sort -V); do
            mv "$f" "media_out/${CARR}-${i}.png"
            i=$((i+1))
          done
          echo "PNG listos:"
          ls media_out/*.png

      - name: Publicar
        env:
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
          PNG_DIR: media_out
        run: |
          python scripts/publicador.py
