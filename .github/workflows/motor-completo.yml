name: motor-completo
on:
  workflow_dispatch: {}
permissions:
  contents: write
  id-token: write
jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependencias
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libpango-1.0-0 libpangoft2-1.0-0 poppler-utils
          pip install weasyprint --quiet

      - name: Renderizar carrusel del manifiesto (nombre dinámico)
        run: |
          RP=$(find . -name render.py -path "*design-system*" | head -1)
          RD=$(dirname "$RP")
          CARR=$(python3 -c "import json,glob,os; f=sorted(glob.glob('manifiestos/manifiesto_*.json'),key=os.path.getmtime)[-1]; m=json.load(open(f)); print(m['canales']['instagram']['carrusel'])")
          echo "Carrusel: $CARR"
          mkdir -p media_out
          JSON="$RD/slides/${CARR}_carrusel.json"
          if [ ! -f "$JSON" ]; then JSON="$RD/slides/ejemplo_ep1-1.json"; echo "Aviso: uso spec de ejemplo"; fi
          echo "Spec: $JSON"
          python "$RP" "$JSON" "media_out" --png
          BASE=$(basename "${JSON%.json}")
          i=1
          for f in $(ls media_out/${BASE}-*.png 2>/dev/null | sort -V); do
            mv "$f" "media_out/${CARR}-${i}.png"; i=$((i+1))
          done
          echo "PNG:"; ls media_out/*.png

      - name: Empujar PNGs a motion-media (para que Blotato los lea por URL)
        env:
          TOKEN: ${{ secrets.MEDIA_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/ops-motionco/motion-media.git" media_repo
          mkdir -p media_repo/carruseles
          cp media_out/*.png media_repo/carruseles/
          cd media_repo
          git config user.name "motion-engine"
          git config user.email "engine@motion.local"
          git add -A
          git commit -m "carrusel actualizado" || echo "sin cambios"
          git push
          echo "Imágenes en https://ops-motionco.github.io/motion-media/carruseles/"

      - name: Esperar a que GitHub Pages publique las imágenes
        run: sleep 90

      - name: Publicar en Blotato (modo revisión, programado)
        env:
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
          PNG_DIR: media_out
        run: |
          touch manifiestos/manifiesto_ep1-1.json
          python scripts/publicador.py
