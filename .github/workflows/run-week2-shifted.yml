name: run-week2-shifted

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
    paths:
      - automation/run-week2-shifted-live.json

permissions:
  contents: write

jobs:
  render-and-schedule:
    runs-on: ubuntu-latest
    env:
      MEDIA_BASE: https://raw.githubusercontent.com/PauloStrina/motion-content-engine/main/public/2026-07-week2
    steps:
      - uses: actions/checkout@v4

      - name: Validar disparador
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          marker=json.loads(Path('automation/run-week2-shifted-live.json').read_text())
          assert marker.get('mode') == 'live'
          assert marker.get('week') == 2
          print(marker)
          PY

      - name: Instalar render
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libpango-1.0-0 libpangoft2-1.0-0 poppler-utils
          pip install --quiet weasyprint

      - name: Restaurar recurso conceptual aprobado
        run: |
          python - <<'PY'
          import base64
          import re
          from pathlib import Path
          source = Path('design-system/generated/2026-07/rock-vs-solution.jpg.b64')
          target = Path('design-system/generated/2026-07/rock-vs-solution.jpg')
          payload = ''.join(re.findall(r'[A-Za-z0-9+/=]', source.read_text(encoding='utf-8')))
          payload += '=' * (-len(payload) % 4)
          target.write_bytes(base64.b64decode(payload, validate=False))
          print(target, target.stat().st_size)
          PY
          file design-system/generated/2026-07/rock-vs-solution.jpg

      - name: Renderizar assets finales
        run: |
          mkdir -p media_out
          python design-system/render.py design-system/slides/2026-07-21-linkedin.json media_out --png
          python design-system/render.py design-system/slides/2026-07-21-instagram.json media_out --png
          python design-system/render.py design-system/slides/2026-07-23-linkedin.json media_out --png
          python design-system/render.py design-system/slides/2026-07-23-instagram.json media_out --png
          test "$(find media_out -name '*.png' | wc -l)" -eq 11
          ls -lah media_out

      - name: Publicar medios en el repositorio primario
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git" publish_repo
          cd publish_repo
          git checkout main
          mkdir -p public/2026-07-week2
          cp ../media_out/*.png public/2026-07-week2/
          git config user.name "motion-engine"
          git config user.email "engine@motion.local"
          git add public/2026-07-week2/
          git commit -m "media: semana 2 desplazada 2026-07" || echo "sin cambios"
          git push origin main

      - name: Esperar disponibilidad pública
        run: sleep 20

      - name: Dry run
        run: python scripts/schedule_week2_shifted.py --dry

      - name: Programar en Blotato
        env:
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
        run: python scripts/schedule_week2_shifted.py

      - name: Guardar IDs de programación
        run: |
          git config user.name "motion-engine"
          git config user.email "engine@motion.local"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add content/2026-07-week2/scheduled.json design-system/generated/2026-07/rock-vs-solution.jpg
          git commit -m "schedule: registrar semana 2 desplazada" || echo "sin cambios"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: Publicar evidencia
        uses: actions/upload-artifact@v4
        with:
          name: week2-shifted-evidence
          path: |
            media_out/
            content/2026-07-week2/scheduled.json
          retention-days: 14
