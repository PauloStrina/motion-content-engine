name: 1-cascada-semanal
on:
  workflow_dispatch:
    inputs:
      fecha:
        description: "Fecha del LUNES de la semana a publicar (YYYY-MM-DD). Es el nombre del manifiesto y ancla la programación."
        required: true
      semana:
        description: "Semana editorial (1-8). Vacío = la primera 'pendiente' del calendario. Define tesis + tipos."
        required: false
        default: ""
permissions:
  contents: write
  id-token: write
jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Estratega + Redactor + Diseñador (generan manifiesto y slides)
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-opus-4-8 --allowedTools Read,Write,Edit,Glob,Grep,Bash"
          show_full_output: true
          prompt: |
            Sos el equipo de contenido de Motion (Estratega + Redactor + Diseñador). Tu trabajo es de CRITERIO, no mecánico.
            FECHA (lunes de la semana): "${{ github.event.inputs.fecha }}" — es la CLAVE del manifiesto y de todos los archivos.
            Semana editorial: "${{ github.event.inputs.semana }}" (si está vacío, tomá la primera "pendiente" en CALENDARIO_EDITORIAL.md). De esa fila salen: tesis, tipo y **TEMA** de cada pieza.
            ⚠️ EL TEMA SALE DE LA COLUMNA "Tema" DEL CALENDARIO. NO inventes un tema nuevo (ej: no inventes "archipiélago digital" si el tema es "¿Cambio o Transformación?"). Podés afinar el título, NUNCA cambiar el tema.

            ## MODELO: 1 MANIFIESTO SEMANAL (todo en un archivo, nombrado por la fecha)
            La semana tiene 2 contenidos que comparten tesis pero NO ángulo:
            - CAROUSEL (tipo problema o resultados): canales linkedin_paulo (PDF), instagram (HEM), x_paulo_hem (hilo). Sale martes.
            - INSTITUCIONAL: linkedin_motion (post que refuerza la tesis). Sale miércoles.
            - NEWSLETTER (tipo metodo o conexion): newsletter .md (manual) + instagram_newsletter (carrusel news) + x_paulo_news (hilo). Sale jueves.
            TODOS los canales de Blotato van en UN manifiesto: manifiestos/manifiesto_${{ github.event.inputs.fecha }}.json

            ## PASO 0 — CARGAR CONTEXTO (OBLIGATORIO, ANTES DE ESCRIBIR NADA)
            Leé COMPLETOS y a fondo. No saltees, no leas solo el principio:
            - strategy/VOZ_corpus.md  (la voz real de Paulo — el más importante; absorbé ritmo, conectores, cómo baja lo abstracto)
            - strategy/tesis.md       (las 4 tesis + matriz de intención por tipo de mensaje)
            - strategy/voz-motion.md  (Brand Voice Playbook, formato por canal, léxico prohibido)
            - strategy/buyer-persona.md (a quién le hablás)
            - evidencias/banco.md     (fuente de datos/casos; podés usar números/casos cuando aporten — Paulo revisa y aprueba TODO antes de publicar)
            Si una pieza no suena a Paulo, NO está lista: reescribí. Aplicá la auto-crítica de VOZ_corpus.md §5.

            ## GENERACIÓN (seguí los PROMPTs)
            Leé scripts/PROMPT_redactor.md, scripts/PROMPT_disenador.md, scripts/PROMPT_newsletter.md y scripts/PROMPT_carrusel_newsletter.md.
            Usá <fecha> = "${{ github.event.inputs.fecha }}" en TODOS los nombres de archivo.

            1. manifiestos/manifiesto_<fecha>.json — manifiesto semanal con los 6 canales (estructura EXACTA en PROMPT_redactor.md). Incluí fecha_inicio=<fecha>, semana, tesis, carousel.tipo/tema, newsletter.tipo/tema.
            2. design-system/slides/<fecha>_carrusel.json — carrusel HEM (paleta por carousel.tipo). Cantidad = carrusel_slides del manifiesto.
            3. newsletters/newsletter_<fecha>.md — el newsletter (Paulo lo publica manual).
            4. design-system/slides/<fecha>_news.json — carrusel newsletter, 8 slides, "episodio":"<fecha>".

            ## REGLAS DE CALIDAD (no negociables)
            - Test de diferenciación: si el newsletter se pudiera resumir en las slides del carousel, falló el ángulo. Reescribí.
            - No reutilices texto viejo sin repensarlo. Cada pieza cumple la INTENCIÓN de su tipo (matriz en tesis.md) y pasa la auto-crítica de voz.
            5. Actualizá el estado de la semana a "generado" en CALENDARIO_EDITORIAL.md.

            Éxito = existen los 4 archivos con clave <fecha> (manifiesto con 6 canales, <fecha>_carrusel.json que coincide en cantidad, newsletter_<fecha>.md, <fecha>_news.json con 8 slides).
      - name: Commit
        run: |
          git config user.name "motion-engine"; git config user.email "engine@motion.local"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add -A
          git commit -m "cascada: manifiesto + slides generados" || echo "sin cambios"
          git push origin HEAD:main
