name: 1-cascada-semanal
on:
  workflow_dispatch:
    inputs:
      episodio:
        description: "Episodio a generar (ej: ep1-3). Vacío = el Estratega elige el siguiente."
        required: false
        default: ""
permissions:
  contents: write
  id-token: write
jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Estratega + Redactor + Diseñador (generan manifiesto y slides)
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Read,Write,Edit,Glob,Grep,Bash"
          show_full_output: true
          prompt: |
            Episodio solicitado: "${{ github.event.inputs.episodio }}" (si está vacío, tomá el siguiente de la serie).
            1. Leé scripts/PROMPT_redactor.md y seguilo: generá manifiestos/manifiesto_<ep>.json con las 4 piezas por canal.
            2. Leé scripts/PROMPT_disenador.md: generá el JSON de slides del carrusel en la carpeta slides/ del design-system,
               con nombre <carrusel>_carrusel.json y la cantidad de slides que declare el manifiesto.
            3. Validá que manifiesto y JSON de slides tengan la MISMA cantidad de slides.
            Éxito = existen ambos archivos y coinciden en cantidad.
      - name: Commit
        run: |
          git config user.name "motion-engine"; git config user.email "engine@motion.local"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add -A
          git commit -m "cascada: manifiesto + slides generados" || echo "sin cambios"
          git push origin HEAD:main
